<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Recuperar Dados</title>
<style>
body{font-family:sans-serif;padding:24px;background:#f7f4ef;color:#1e1a14;max-width:600px;margin:0 auto}
h1{color:#a07830;font-size:22px;margin-bottom:8px}
p{font-size:14px;color:#6a5e4a;margin-bottom:16px;line-height:1.6}
button{background:linear-gradient(135deg,#a07830,#c9a84c);color:#fff;border:none;border-radius:10px;padding:14px 20px;font-size:15px;font-weight:700;cursor:pointer;width:100%;margin-top:8px}
.card{background:#fff;border-radius:14px;padding:20px;border:1px solid #e0d8cc;margin-bottom:16px}
.ok{background:#eaf4ee;border:1px solid #b0d8c0;border-radius:10px;padding:14px;margin-top:12px;font-size:14px;color:#3a6a48;line-height:1.8}
.vazio{background:#fff0ee;border:1px solid #e0b0a8;border-radius:10px;padding:14px;margin-top:12px;font-size:14px;color:#8a3a3a;line-height:1.8}
pre{background:#f0f0f0;padding:10px;border-radius:8px;font-size:11px;overflow-x:auto;margin-top:8px;white-space:pre-wrap;word-break:break-all}
</style>
</head>
<body>
<h1>🔍 Recuperar Dados</h1>
<p>Toque no botão abaixo para verificar se há dados salvos neste dispositivo.</p>

<div class="card">
  <strong>Verificar e exportar dados</strong>
  <p style="margin-top:8px;margin-bottom:0;font-size:13px">Esta página lê todos os dados salvos no localStorage deste iPad e exporta um backup.</p>
  <button onclick="verificar()">🔍 Verificar agora</button>
  <div id="resultado"></div>
</div>

<script>
function verificar(){
  var chaves = ['est_clients','est_atends','est_atendimentos','est_termos','est_termosRegistrados','est_agenda','est_pacotes','est_pacotesCliente','est_minhaSig'];
  var dados = {};
  var temAlgo = false;
  var info = '';

  // Mostra TODAS as chaves do localStorage para diagnóstico
  info += 'Total de chaves no localStorage: ' + localStorage.length + '\n';
  for(var i = 0; i < localStorage.length; i++){
    var k = localStorage.key(i);
    info += 'Chave: ' + k + '\n';
  }

  chaves.forEach(function(k){
    try{
      var v = localStorage.getItem(k);
      if(v){
        var p = JSON.parse(v);
        dados[k] = p;
        if(Array.isArray(p) && p.length > 0) temAlgo = true;
        else if(typeof p === 'string' && p.length > 0) temAlgo = true;
      }
    }catch(e){}
  });

  var r = document.getElementById('resultado');

  if(temAlgo){
    var clients = dados['est_clients'] || [];
    var atends = dados['est_atends'] || dados['est_atendimentos'] || [];
    var termos = dados['est_termos'] || dados['est_termosRegistrados'] || [];
    var agenda = dados['est_agenda'] || [];
    var pacotes = dados['est_pacotes'] || dados['est_pacotesCliente'] || [];

    r.innerHTML = '<div class="ok">✓ Dados encontrados!<br>' +
      '👥 ' + clients.length + ' cliente(s)<br>' +
      '🗓️ ' + atends.length + ' evolução(ões)<br>' +
      '📝 ' + termos.length + ' termo(s)<br>' +
      '📅 ' + agenda.length + ' agendamento(s)<br>' +
      '📦 ' + pacotes.length + ' pacote(s)</div>' +
      '<button onclick="exportar()" style="margin-top:12px">💾 Baixar backup_recuperado.json</button>';

    window._backup = {clients:clients,atends:atends,termos:termos,agenda:agenda,pacotes:pacotes};
  } else {
    r.innerHTML = '<div class="vazio">⚠️ Nenhum dado encontrado neste link.<br><br>' +
      '<strong>Diagnóstico:</strong><pre>' + info + '</pre></div>';
  }
}

function exportar(){
  var b = window._backup;
  if(!b) return;
  var blob = new Blob([JSON.stringify(b,null,2)],{type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'backup_recuperado.json';
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>

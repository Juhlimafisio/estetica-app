function SigPad(props){

              if(!blob)return showToast('⚠️ Erro.');
              var file=new File([blob],'Termo_'+t.nome.replace(/ /g,'_')+'.png',{type:'image/png'});
              if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){navigator.share({title:'Termo de Consentimento',files:[file]}).catch(function(){});}
              else{var u=URL.createObjectURL(blob);var a=document.createElement('a');a.href=u;a.download=file.name;a.click();URL.revokeObjectURL(u);}
            },'image/png');
          }},'📤 Compartilhar Termo'),
          h('button',{onClick:function(){setDelConf({tipo:'termo',id:t.id});},style:{width:'100%',fontSize:12,fontWeight:600,color:'#8a3a3a',background:'#fdf0ee',border:'1px solid #e0b0a8',borderRadius:8,padding:'10px',cursor:'pointer'}},'🗑️ Apagar Termo')
        );})
      )
    ),

    // MODAL EDITAR CLIENTE
    editClient&&h('div',{className:'modal-bg',onClick:function(){setEditClient(null);}},
      h('div',{className:'modal-box',onClick:function(e){e.stopPropagation();}},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}},
          h('div',{style:{fontFamily:"'Cormorant Garamond',serif",fontSize:22,color:'#1e1a14'}},'Editar Cadastro'),
          h('button',{onClick:function(){setEditClient(null);},style:{background:'none',border:'none',fontSize:24,color:'#a09080',cursor:'pointer'}},'×')
        ),
        h(Field,{label:'Nome completo *'},h('input',{className:'inp',placeholder:'Nome da cliente',value:editClient.nome,onChange:function(e){setEditClient(function(f){return Object.assign({},f,{nome:e.target.value});});}})),
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}},
          h(Field,{label:'Telefone *'},h('input',{className:'inp',placeholder:'(11) 99999-0000',value:editClient.tel,onChange:function(e){setEditClient(function(f){return Object.assign({},f,{tel:fmtTel(e.target.value)});});}})),
          h(Field,{label:'Data de nascimento'},h('input',{type:'date',className:'inp',value:editClient.nasc||'',onChange:function(e){setEditClient(function(f){return Object.assign({},f,{nasc:e.target.value});})}}))
        ),
        h(Field,{label:'CPF'},h('input',{className:'inp',placeholder:'000.000.000-00',value:editClient.cpf||'',onChange:function(e){var v=e.target.value.replace(/\D/g,'').slice(0,11);if(v.length>9)v=v.replace(/(\d{3})(\d{3})(\d{3})(\d{0,2})/,'$1.$2.$3-$4');else if(v.length>6)v=v.replace(/(\d{3})(\d{3})(\d{0,3})/,'$1.$2.$3');else if(v.length>3)v=v.replace(/(\d{3})(\d{0,3})/,'$1.$2');setEditClient(function(f){return Object.assign({},f,{cpf:v});});}})),
        h(Field,{label:'E-mail'},h('input',{className:'inp',placeholder:'email@exemplo.com',value:editClient.email||'',onChange:function(e){setEditClient(function(f){return Object.assign({},f,{email:e.target.value});});}})),
        h('div',{style:{display:'flex',gap:10,marginTop:8}},
          h('button',{className:'btn-out',style:{flex:1},onClick:function(){setEditClient(null);}},'Cancelar'),
          h('button',{className:'btn',style:{flex:1},onClick:function(){
            if(!editClient.nome||!editClient.tel)return showToast('⚠️ Preencha nome e telefone.');
            setClients(function(prev){return prev.map(function(c){return c.id===editClient.id?Object.assign({},c,{nome:editClient.nome,tel:editClient.tel,nasc:editClient.nasc,cpf:editClient.cpf,email:editClient.email}):c;});});
            showToast('✓ Cadastro atualizado!');setEditClient(null);
          }},'Salvar Alterações')
        )
      )
    ),

    // MODAL DELETE
    delConf&&h('div',{className:'modal-bg',onClick:function(){setDelConf(null);}},
      h('div',{className:'modal-box',onClick:function(e){e.stopPropagation();},style:{padding:'28px 24px 36px'}},
        h('div',{style:{fontFamily:"'Cormorant Garamond',serif",fontSize:22,color:'#1e1a14',marginBottom:10}},'Confirmar exclusão'),
        h('div',{style:{fontSize:14,color:'#6a5e4a',marginBottom:24,lineHeight:1.6}},
          delConf.tipo==='atend'?'Tem certeza que quer apagar esta evolução?':delConf.tipo==='agenda'?'Tem certeza que quer apagar este agendamento?':'Tem certeza que quer apagar este termo?',' Esta ação não pode ser desfeita.'
        ),
        h('div',{style:{display:'flex',gap:10}},
          h('button',{className:'btn-out',style:{flex:1},onClick:function(){setDelConf(null);}},'Cancelar'),
          h('button',{style:{flex:1,background:'#8a3a3a',color:'#fff',border:'none',borderRadius:10,padding:'13px 20px',fontSize:14,fontWeight:700,cursor:'pointer'},onClick:function(){
            if(delConf.tipo==='atend')setAtends(function(prev){return prev.filter(function(a){return a.id!==delConf.id;});});
            else if(delConf.tipo==='agenda')setAgenda(function(prev){return prev.filter(function(a){return a.id!==delConf.id;});});
            else setTermos(function(prev){return prev.filter(function(t){return t.id!==delConf.id;});});
            setDelConf(null);showToast('✓ Apagado.');
          }},'Apagar')
        )
      )
    ),

    // NAV
    h('nav',{className:'nav'},
      navItems.map(function(item){return h('button',{key:item.k,className:'nav-btn'+(sec===item.k?' active':''),onClick:function(){setSec(item.k);}},h('span',{style:{fontSize:18}},item.icon),item.l);})
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));

</script>
</body>
</html>
